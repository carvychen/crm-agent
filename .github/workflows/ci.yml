name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit:
    name: Unit tests (mocked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run unit tests
        run: pytest tests/ --ignore=tests/integration -v

  integration:
    name: Live integration tests (real tenant)
    runs-on: ubuntu-latest
    # ADR 0007: PR merges are gated on live tests passing against the author's
    # Azure Global dev tenant. All secrets listed below are required for the
    # job to pass — see docs/adr/0007-testing-discipline.md for the rationale
    # and how to provision them.
    env:
      # Dataverse + MCP-server tests (same credentials as the legacy demo):
      DATAVERSE_URL: ${{ secrets.DATAVERSE_URL }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      # Foundry test credentials — Foundry lives in a different tenant; a
      # service principal in that tenant with Cognitive Services User on the
      # project is required. Local dev can use `az login` instead.
      FOUNDRY_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_PROJECT_ENDPOINT }}
      FOUNDRY_MODEL: ${{ secrets.FOUNDRY_MODEL }}
      FOUNDRY_AZURE_TENANT_ID: ${{ secrets.FOUNDRY_AZURE_TENANT_ID }}
      FOUNDRY_AZURE_CLIENT_ID: ${{ secrets.FOUNDRY_AZURE_CLIENT_ID }}
      FOUNDRY_AZURE_CLIENT_SECRET: ${{ secrets.FOUNDRY_AZURE_CLIENT_SECRET }}
      # Force dev-path auth; production runtime enforces obo (function_app.py).
      AUTH_MODE: app_only_secret
      CLOUD_ENV: global
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run live-integration tests
        run: pytest tests/integration -v

  bicep:
    name: Bicep validation (build + what-if under both clouds)
    runs-on: ubuntu-latest
    # Always runs `az bicep build` on every PR; runs `az deployment group
    # what-if` against a scratch resource group when the subscription +
    # scratch-RG secrets are configured. Tests themselves skip the what-if
    # block when BICEP_WHATIF_RESOURCE_GROUP is absent — see
    # tests/integration/test_bicep_live.py and ADR 0007.
    env:
      BICEP_WHATIF_RESOURCE_GROUP: ${{ secrets.BICEP_WHATIF_RESOURCE_GROUP }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Install Bicep CLI
        run: az bicep install
      - name: Azure login (only when what-if secrets are present)
        if: ${{ env.BICEP_WHATIF_RESOURCE_GROUP != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_BICEP_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_BICEP_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_BICEP_SUBSCRIPTION_ID }}
      - name: Run Bicep tests
        run: pytest tests/integration/test_bicep_live.py -v
